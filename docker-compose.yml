services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mining-backend
    environment:
      APP_ENV: production
      HTTP_ADDR: ":8080"
      DB_PATH: /data/app.db
      JWT_SECRET: change-me-in-production
    volumes:
      - ./data:/data
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mining-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped